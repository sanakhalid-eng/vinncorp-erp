spring.application.name=project-management-backend-test

server.port=0

# H2 in-memory database with MySQL compatibility
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MYSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests
spring.flyway.enabled=false

# JWT config (test RSA keys generated by TestJwtKeyProvider)
jwt.private-key=test
jwt.public-key=test
jwt.expiration=900000
jwt.refresh.expiration=604800000

# Encryption (fixed 32-byte base64 key for tests)
encryption.secret-key=VGhpcyBpcyBhIDMyLWJ5dGUgYmFzZTY0IGVuY29kaW5nIGtleQ==

# Test mail - disabled
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.test-connection=false

# Cloudinary - disabled for tests
cloudinary.cloud_name=test
cloudinary.api_key=test
cloudinary.api_secret=test

# Slack - test values
slack.client-id=test-client-id
slack.client-secret=test-client-secret
slack.signing-secret=test-signing-secret
app.base-url=http://localhost:8081

# OAuth - disabled for tests
spring.security.oauth2.client.registration.github.client-id=test
spring.security.oauth2.client.registration.github.client-secret=test

# Upload dir for tests
app.upload.dir=build/test-uploads
