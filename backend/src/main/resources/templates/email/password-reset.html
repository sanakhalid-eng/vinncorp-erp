<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    </style>
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f9fafb;">
    <div style="max-width:600px; margin:0 auto; background-color:white; padding:20px;">
        <!-- Header -->
        <div class="gradient-bg" style="padding:40px 20px; text-align:center; border-radius:10px 10px 0 0;">
            <h1 style="color:white; margin:0; font-size:28px;">Password Reset</h1>
            <p style="color:rgba(255,255,255,0.9); margin:10px 0 0 0; font-size:16px;">Secure your account</p>
        </div>
        
        <!-- Body Content -->
        <div style="padding:40px 20px;">
            <h2 style="color:#1f2937; margin:0 0 20px 0;">Reset Your Password</h2>
            <p style="color:#4b5563; line-height:1.6; margin:0 0 30px 0;">
                You requested a password reset. Click the button below to reset your password.
            </p>
            
            <div style="text-align:center; margin:30px 0;">
                <a th:href="${resetUrl}" style="background:linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color:white; padding:14px 40px; text-decoration:none; border-radius:8px; font-weight:bold; display:inline-block;">
                    Reset Password
                </a>
            </div>
            
            <p style="color:#6b7280; font-size:12px; line-height:1.6; margin:20px 0 0 0;">
                This link will expire in 15 minutes. If you didn't request this, please ignore this email.
            </p>
        </div>
        
        <!-- Footer -->
        <div style="background-color:#f9fafb; padding:20px; text-align:center; border-radius:0 0 10px 10px; border-top:1px solid #e5e7eb;">
            <p style="color:#6b7280; font-size:12px; margin:0;">
                &copy; 2026 PMT-SK. All rights reserved.
            </p>
        </div>
    </div>
</body>
</html>
