spring.application.name=project-management-backend
server.port=${PORT:8081}

# ========================
# Active Profile
# ========================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}

# ========================
# Database
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/project_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pmt_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pmt_password}

spring.jpa.hibernate.ddl-auto=validate

# ========================
# Flyway
# ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT (RS256 — set JWT_PRIVATE_KEY_BASE64 and JWT_PUBLIC_KEY_BASE64 in env)
# ========================
jwt.private-key=${JWT_PRIVATE_KEY_BASE64:}
jwt.public-key=${JWT_PUBLIC_KEY_BASE64:}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ========================
# GitHub OAuth
# ========================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:github-local-dev}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:github-local-dev-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ========================
# Static Resources & Uploads
# ========================
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# Cloudinary
# ========================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api_key=${CLOUDINARY_API_KEY:demo}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:demo}

# ========================
# Slack
# ========================
slack.client-id=${SLACK_CLIENT_ID:}
slack.client-secret=${SLACK_CLIENT_SECRET:}
slack.signing-secret=${SLACK_SIGNING_SECRET:}

# ========================
# App (frontend URL for emails / OAuth redirects)
# ========================
app.base-url=${APP_BASE_URL:http://localhost:5173}

# ========================
# Encryption
# ========================
encryption.secret-key=${ENCRYPTION_SECRET_KEY:}

# ========================
# Email (SMTP)
# ========================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json
springdoc.cache.disabled=true

# ========================
# Redis
# ========================
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.timeout=5000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ========================
# Cache
# ========================
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false
spring.cache.type=${SPRING_CACHE_TYPE:simple}

# ========================
# Rate Limiting
# ========================
api.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
api.rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:60}

# ========================
# Actuator
# ========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.health.db.enabled=true
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
management.health.diskspace.enabled=true
