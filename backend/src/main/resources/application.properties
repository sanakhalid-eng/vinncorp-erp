spring.application.name=project-management-backend
server.port=${PORT:8081}

# ========================
# Active Profile
# ========================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}

# ========================
# Database
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/project_management}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dummypassword}

spring.jpa.hibernate.ddl-auto=validate

# ========================
# Flyway
# ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET:projectManagementJwtSecretKeyForSpringBoot2026}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ========================
# GitHub OAuth
# ========================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:Ov23lin7rXytcWoAJ9Ee}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:06d93136e6cb9be4dd4bdc47691128bd96d25e1f}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ========================
# Static Resources & Uploads
# ========================
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# Cloudinary
# ========================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:dv3sn9vrd}
cloudinary.api_key=${CLOUDINARY_API_KEY:876858344123227}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:T8f8pdJ0imG-6jdYqVoW_hb1zVQ}

# ========================
# Slack
# ========================
slack.client-id=${SLACK_CLIENT_ID:11048846916982.11079254644768}
slack.client-secret=${SLACK_CLIENT_SECRET:a07c9dfb5ad2b148f68b51d15d71b40c}
slack.signing-secret=${SLACK_SIGNING_SECRET:a07c9dfb5ad2b148f68b51d15d71b40c}

# ========================
# App (frontend URL for emails / OAuth redirects)
# ========================
app.base-url=${APP_BASE_URL:http://localhost:5173}

# ========================
# Encryption
# ========================
encryption.secret-key=${ENCRYPTION_SECRET_KEY:VGhpcyBpcyBhIDMyLWJ5dGUgYmFzZTY0IGVuY29kaW5nIGtleQ==}

# ========================
# Email (SMTP)
# ========================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:sanakhalid21002@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:mblv wwap nvwy ngaz}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.test-connection=false

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json
springdoc.cache.disabled=true

# ========================
# Redis
# ========================
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.timeout=5000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ========================
# Cache
# ========================
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# ========================
# Actuator
# ========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.health.db.enabled=true
management.health.redis.enabled=true
management.health.diskspace.enabled=true