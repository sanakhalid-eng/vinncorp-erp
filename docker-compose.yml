version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pmt-sk-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: project_management
      MYSQL_USER: pmt_user
      MYSQL_PASSWORD: pmt_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pmt-network

  redis:
    image: redis:7-alpine
    container_name: pmt-sk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pmt-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmt-sk-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/project_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: pmt_user
      SPRING_DATASOURCE_PASSWORD: pmt_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: this-is-a-very-long-secret-key-for-jwt-signing-must-be-at-least-32-chars
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 86400
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-demo}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-demo}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pmt-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pmt-sk-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8081
    depends_on:
      - backend
    networks:
      - pmt-network

volumes:
  mysql_data:
  redis_data:

networks:
  pmt-network:
    driver: bridge
